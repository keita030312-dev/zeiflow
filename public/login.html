<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeiFlow - ログイン</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0F172A; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.wrap { width: 100%; max-width: 400px; }
h1 { text-align: center; color: #D4AF37; font-size: 28px; font-weight: bold; margin-bottom: 8px; }
.sub { text-align: center; color: #94A3B8; font-size: 12px; margin-bottom: 32px; }
.card { background: rgba(30,41,59,0.8); border-radius: 12px; padding: 32px; border: 1px solid rgba(212,175,55,0.12); }
h2 { text-align: center; color: #F1F5F9; font-size: 18px; font-weight: 600; margin-bottom: 24px; }
.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 12px; margin-bottom: 16px; color: #f87171; font-size: 14px; }
label { display: block; color: #94A3B8; font-size: 14px; margin-bottom: 6px; }
input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(212,175,55,0.12); background: rgba(15,23,42,0.5); color: #F1F5F9; font-size: 16px; outline: none; }
input:focus { border-color: #D4AF37; }
.field { margin-bottom: 16px; }
.field-last { margin-bottom: 24px; }
button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(to right, #D4AF37, #B8962E); color: #0F172A; font-weight: 600; font-size: 16px; cursor: pointer; }
button:active { opacity: 0.8; }
.footer { text-align: center; color: #64748B; font-size: 14px; margin-top: 20px; }
.footer a { color: #D4AF37; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ZeiFlow</h1>
  <p class="sub">TAX MANAGEMENT SYSTEM</p>
  <div class="card">
    <h2>ログイン</h2>
    <div id="err"></div>
    <form method="POST" action="/api/auth/login-form">
      <div class="field">
        <label>メールアドレス</label>
        <input name="email" type="email" placeholder="email@example.com" required autocomplete="email">
      </div>
      <div class="field-last">
        <label>パスワード</label>
        <input name="password" type="password" placeholder="パスワード" required autocomplete="current-password">
      </div>
      <button type="submit">ログイン</button>
    </form>
    <p class="footer">アカウントをお持ちでない方は <a href="/register">新規登録</a></p>
  </div>
  <div style="text-align:center;margin-top:16px;font-size:12px;">
    <a href="/terms" style="color:#64748B;text-decoration:none;margin-right:12px;">利用規約</a>
    <a href="/privacy" style="color:#64748B;text-decoration:none;">プライバシーポリシー</a>
  </div>
</div>
<script>
var p = new URLSearchParams(location.search);
var e = p.get('error');
if (e) document.getElementById('err').className = 'error', document.getElementById('err').textContent = decodeURIComponent(e);
</script>
</body>
</html>
